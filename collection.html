    <div class="logo">
      <a class="logo-link" href="index.html" aria-label="Silver Spring Records home">
        <img src="images/logo.png" alt="Silver Spring Records">

<main>
  <section class="page-header">
    <h1>Collection</h1>
    <p>Review the Silver Spring Records music library, plus wishlist tracks still being sourced.</p>
  </section>

  <section class="collection-section" aria-labelledby="collection-heading">
    <div class="collection-heading-row">
      <div>
        <h2 id="collection-heading">Music Collection</h2>
        <p id="collection-count" class="collection-count" aria-live="polite">Loading collection...</p>
      </div>
      <div class="collection-toolbar">
        <div class="collection-view-toggle" role="group" aria-label="Collection view">
          <button type="button" class="active" data-collection-view="collection" aria-pressed="true">Collection</button>
          <button type="button" data-collection-view="wishlist" aria-pressed="false">Wishlist</button>
        </div>
        <label class="filter-field filter-field-global">
          <span>Search all columns</span>
          <input type="search" id="collection-global-filter" autocomplete="off" placeholder="Title, artist, album, status">
        </label>
        <label class="filter-field collection-page-size">
          <span>Rows</span>
          <select id="collection-page-size" aria-label="Rows per page">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
      </div>
    </div>

    <div class="collection-table-wrap">
      <table class="collection-table" data-collection-table data-source="collection/music-collection.json" data-wishlist-source="collection/music-wishlist.json">
        <thead>
          <tr></tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5">Loading collection...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <nav class="collection-pagination" aria-label="Collection pages">
      <button type="button" id="collection-prev-page" class="collection-page-button">Previous</button>
      <span id="collection-page-status" class="collection-page-status" aria-live="polite">Page 1</span>
      <button type="button" id="collection-next-page" class="collection-page-button">Next</button>
    </nav>
  </section>
</main>

<footer>
  <p>&copy; <span id="year"></span> Silver Spring Records</p>
