<main>
  <section class="page-header">
    <h1>Collection</h1>
    <p>Review the Silver Spring Records music library with source links for each cataloged track.</p>
  </section>

  <section class="collection-section" aria-labelledby="collection-heading">
    <div class="collection-heading-row">
      <div>
        <h2 id="collection-heading">Music Collection</h2>
        <p id="collection-count" class="collection-count" aria-live="polite">Loading collection...</p>
      </div>
      <label class="filter-field filter-field-global">
        <span>Search all columns</span>
        <input type="search" id="collection-global-filter" autocomplete="off" placeholder="Title, artist, album, source">
      </label>
    </div>

    <div class="collection-table-wrap">
      <table class="collection-table" data-collection-table data-source="data/music-collection.json">
        <thead>
          <tr>
            <th scope="col">
              <span>Title</span>
              <input type="search" data-column-filter="title" autocomplete="off" aria-label="Filter by title">
            </th>
            <th scope="col">
              <span>Artist</span>
              <input type="search" data-column-filter="artist" autocomplete="off" aria-label="Filter by artist">
            </th>
            <th scope="col">
              <span>Album</span>
              <input type="search" data-column-filter="album" autocomplete="off" aria-label="Filter by album">
            </th>
            <th scope="col">
              <span>Duration</span>
              <input type="search" data-column-filter="duration" autocomplete="off" aria-label="Filter by duration">
            </th>
            <th scope="col">
              <span>Source</span>
              <input type="search" data-column-filter="source" autocomplete="off" aria-label="Filter by source">
            </th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5">Loading collection...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
